name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # needed to push the built files to the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # GITHUB_PAGES=true makes scripts/build.mjs set the Vite base path to
      # /marriage-workbook-quizz-app/ so all asset URLs are repo-relative.
      # Output lands in dist/ at the repo root.
      - name: Build
        run: pnpm run build
        env:
          GITHUB_PAGES: 'true'

      # Pushes the contents of dist/ (not dist/ itself) to the root of the
      # gh-pages branch. GitHub Pages is configured to serve from that branch
      # at Settings → Pages → Source: "Deploy from a branch" → gh-pages / root.
      - name: Deploy dist/ to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
